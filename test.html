<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowDesk – MonthEnd Checklist</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
 
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">FLOWDESK<span>- Month End Checklist</span></div>
    <div class="topbar-meta">
      <span class="badge-count" id="open-count">0 open</span>
    </div>
  </div>
  <div class="toolbar">
    <span class="toolbar-title">Period:</span>
    <div class="wd-tabs" id="wd-tabs"></div>
    <div class="filter-row">
      <span class="filter-label">Primary owner</span>
      <select class="filter-sel" id="filter-assignee"><option value="">All</option></select>
      <span class="filter-label">Status</span>
      <select class="filter-sel" id="filter-status">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="review">In review</option>
        <option value="done">Done</option>
        <option value="overdue">Overdue</option>
      </select>
      <label class="filter-label" style="display:flex;align-items:center;gap:5px;white-space:nowrap;">
        <input id="cb-untick-all" type="checkbox" style="width:14px;height:14px;"> Untick all
      </label>
      <button class="btn-add" id="btn-add-task">+ Add task</button>
    </div>
  </div>
  <div class="content">
    <div class="progress-bar-wrap">
      <span class="progress-label" id="prog-label">0 / 0 complete</span>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="task-table" id="task-table"></div>
  </div>
  <div id="modal-container"></div>
</div>

<script src="script.js"></script>

</body>

</html>
